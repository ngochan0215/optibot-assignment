name: OptiBot Daily Scrape & Upload

on:
  # Chạy tự động mỗi ngày lúc 7h sáng UTC
  schedule:
    - cron: '0 7 * * *'

  # Cho phép chạy thủ công trên GitHub UI (để test)
  workflow_dispatch:

jobs:
  run-daily-job:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repo về
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Bước 3: Cài thư viện
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Bước 4: Chạy job chính
      - name: Run daily job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: python main.py